server:
  port: 8094

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/fluxus_authaccess?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

authorization:
  jwt:
    secret: fluxusbackenddevsecretkeyfluxusbackenddevsecret
    expiration-milliseconds: 86400000

security:
  bcrypt:
    rounds: 4

services:
  retail-company:
    base-url: ${COMPANIES_SERVICE_URL:http://localhost:8101}
  beneficiary:
    base-url: ${BENEFICIARIES_SERVICE_URL:http://localhost:8102}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
