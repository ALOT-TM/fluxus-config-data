server:
  port: 8104

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/fluxus_donations_logistics?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

authorization:
  jwt:
    secret: fluxusbackenddevsecretkeyfluxusbackenddevsecret
    expiration-milliseconds: 86400000

services:
  shrinkage:
    base-url: ${SHRINKAGE_SERVICE_URL:http://localhost:8103}
  beneficiaries:
    base-url: ${BENEFICIARIES_SERVICE_URL:http://localhost:8102}
  authaccess:
    base-url: ${AUTH_SERVICE_URL:http://localhost:8094}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
